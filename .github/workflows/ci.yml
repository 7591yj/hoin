name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.9

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: biome format src

      - name: Lint
        run: biome lint src

      - name: Build CLI for smoke tests
        working-directory: .
        run: cargo build -p hoin-cli

      - name: Test
        run: bun test

  detect-model:
    name: Detect model workspace
    runs-on: ubuntu-latest
    outputs:
      has_model: ${{ steps.detect.outputs.has_model }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        name: Check for models workspace
        shell: bash
        run: |
          models_json="$(./scripts/list-models.sh)"

          if [ "${models_json}" != "[]" ]; then
            echo "has_model=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_model=false" >> "$GITHUB_OUTPUT"
            echo "No releasable models found; skipping model checks."
          fi

  model-python:
    name: Model Python checks
    runs-on: ubuntu-latest
    needs: detect-model
    if: needs.detect-model.outputs.has_model == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Ruff checks
        shell: bash
        run: ./scripts/ruff-models.sh check

  model:
    name: Model export checks
    runs-on: ubuntu-latest
    needs: detect-model
    if: needs.detect-model.outputs.has_model == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run model export checks
        shell: bash
        run: |
          ./scripts/build-models.sh verify
