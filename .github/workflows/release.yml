name: Release

on:
  push:
    tags:
      - "app/v*"
      - "model/*/v*"

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.resolve.outputs.kind }}
      tag: ${{ steps.resolve.outputs.tag }}
      artifact_version: ${{ steps.resolve.outputs.artifact_version }}
      model_name: ${{ steps.resolve.outputs.model_name }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        name: Parse release tag
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"

          case "${ref}" in
            app/v*)
              version="${ref#app/}"
              echo "kind=app" >> "$GITHUB_OUTPUT"
              echo "tag=${ref}" >> "$GITHUB_OUTPUT"
              echo "artifact_version=${version#v}" >> "$GITHUB_OUTPUT"
              echo "model_name=" >> "$GITHUB_OUTPUT"
              ;;
            model/*/v*)
              rest="${ref#model/}"
              model_name="${rest%%/v*}"
              version="${rest#"$model_name"/}"
              models_json="$(./scripts/list-models.sh)"

              python -c 'import json, sys; models = {entry["name"] for entry in json.loads(sys.argv[1])}; model_name = sys.argv[2]; known_models = ", ".join(sorted(models)) or "(none)"; assert model_name in models, f"Unknown release model {model_name!r}. Known releasable models: {known_models}"' "${models_json}" "${model_name}"

              echo "kind=model" >> "$GITHUB_OUTPUT"
              echo "tag=${ref}" >> "$GITHUB_OUTPUT"
              echo "artifact_version=${version#v}" >> "$GITHUB_OUTPUT"
              echo "model_name=${model_name}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release tag: ${ref}" >&2
              exit 1
              ;;
          esac

  release-app:
    needs: resolve-release
    if: needs.resolve-release.outputs.kind == 'app'
    uses: ./.github/workflows/release-app-reusable.yml
    with:
      tag: ${{ needs.resolve-release.outputs.tag }}
      artifact_version: ${{ needs.resolve-release.outputs.artifact_version }}
    secrets: inherit

  release-model:
    needs: resolve-release
    if: needs.resolve-release.outputs.kind == 'model'
    uses: ./.github/workflows/release-model-reusable.yml
    with:
      tag: ${{ needs.resolve-release.outputs.tag }}
      artifact_version: ${{ needs.resolve-release.outputs.artifact_version }}
      model_name: ${{ needs.resolve-release.outputs.model_name }}
    secrets: inherit
