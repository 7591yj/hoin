name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  detect-models:
    name: Detect release models
    runs-on: ubuntu-latest
    outputs:
      has_model: ${{ steps.detect.outputs.has_model }}
      models: ${{ steps.detect.outputs.models }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        name: Discover model directories
        shell: bash
        run: |
          models_json="$(./scripts/list-models.sh)"
          echo "models=${models_json}" >> "$GITHUB_OUTPUT"

          if [ "${models_json}" = "[]" ]; then
            echo "has_model=false" >> "$GITHUB_OUTPUT"
            echo "No releasable model directories found under models/."
          else
            echo "has_model=true" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    name: Build CLI for ${{ matrix.target.target }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: hoin
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: hoin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: hoin.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --package hoin-cli --target ${{ matrix.target.target }}

      - name: Prepare artifact directory
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact_dir="dist/hoin-${version}-${{ matrix.target.target }}"
          mkdir -p "${artifact_dir}"

          binary_path="${artifact_dir}/hoin"

          if [ "${{ matrix.target.binary }}" = "hoin.exe" ]; then
            binary_path="${artifact_dir}/hoin.exe"
          fi

          cp "target/${{ matrix.target.target }}/release/${{ matrix.target.binary }}" "${binary_path}"
          find "target/${{ matrix.target.target }}/release" -maxdepth 1 \
            \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' -o -name '*.dll' \) \
            -exec cp {} "${artifact_dir}/" \;
          binary_file="$(basename "${binary_path}")"
          ./scripts/write-release-readme.sh "${artifact_dir}" "${binary_file}"

      - name: Create tarball
        if: matrix.target.archive == 'tar.gz'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact_name="hoin-${version}-${{ matrix.target.target }}"
          tar -C dist -czf "dist/${artifact_name}.tar.gz" "${artifact_name}"

      - name: Create zip
        if: matrix.target.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $artifactName = "hoin-$version-${{ matrix.target.target }}"
          Compress-Archive -Path "dist/$artifactName/*" -DestinationPath "dist/$artifactName.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-cli-${{ matrix.target.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-model:
    name: Build model ${{ matrix.model.name }}
    runs-on: ubuntu-latest
    needs: detect-models
    if: needs.detect-models.outputs.has_model == 'true'
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.detect-models.outputs.models) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build model artifact
        shell: bash
        run: |
          ./scripts/build-models.sh build "${{ matrix.model.name }}"

      - name: Package model
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./scripts/package-release-model.sh "${{ matrix.model.name }}" "${version}" dist

      - name: Upload packaged model
        uses: actions/upload-artifact@v4
        with:
          name: release-model-${{ matrix.model.name }}
          path: dist/*.tar.gz

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-model
    if: always() && needs.build-cli.result == 'success' && (needs.build-model.result == 'success' || needs.build-model.result == 'skipped')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
