name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  detect-models:
    name: Detect release models
    runs-on: ubuntu-latest
    outputs:
      has_model: ${{ steps.detect.outputs.has_model }}
      models: ${{ steps.detect.outputs.models }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        name: Discover model directories
        shell: bash
        run: |
          models_json="$(./scripts/list-models.sh)"
          echo "models=${models_json}" >> "$GITHUB_OUTPUT"

          if [ "${models_json}" = "[]" ]; then
            echo "has_model=false" >> "$GITHUB_OUTPUT"
            echo "No releasable model directories found under models/."
          else
            echo "has_model=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.model.name }} for ${{ matrix.target.target }}
    runs-on: ${{ matrix.target.os }}
    needs: detect-models
    if: needs.detect-models.outputs.has_model == 'true'
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.detect-models.outputs.models) }}
        target:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: hoin
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: hoin
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: hoin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: hoin.exe
    env:
      HOIN_EMBED_MODEL: ${{ matrix.model.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build model artifact
        shell: bash
        run: |
          ./scripts/build-models.sh build "${HOIN_EMBED_MODEL}"

      - name: Build release binary
        run: cargo build --release --locked --package hoin-cli --target ${{ matrix.target.target }}

      - name: Prepare artifact directory
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact_dir="dist/hoin-${version}-${HOIN_EMBED_MODEL}-${{ matrix.target.target }}"
          mkdir -p "${artifact_dir}"

          binary_name="hoin-${HOIN_EMBED_MODEL}"
          binary_path="${artifact_dir}/${binary_name}"

          if [ "${{ matrix.target.binary }}" = "hoin.exe" ]; then
            binary_path="${binary_path}.exe"
          fi

          cp "target/${{ matrix.target.target }}/release/${{ matrix.target.binary }}" "${binary_path}"
          cp README.md "${artifact_dir}/"

      - name: Create tarball
        if: matrix.target.archive == 'tar.gz'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact_name="hoin-${version}-${HOIN_EMBED_MODEL}-${{ matrix.target.target }}"
          tar -C dist -czf "dist/${artifact_name}.tar.gz" "${artifact_name}"

      - name: Create zip
        if: matrix.target.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $artifactName = "hoin-$version-$env:HOIN_EMBED_MODEL-${{ matrix.target.target }}"
          Compress-Archive -Path "dist/$artifactName/*" -DestinationPath "dist/$artifactName.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.model.name }}-${{ matrix.target.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
